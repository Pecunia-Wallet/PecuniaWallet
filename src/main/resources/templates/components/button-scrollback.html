<link rel="stylesheet" th:href="@{/styles/button-scrollback.css}">
<button id="scrollback" class="scrollback" onclick="scrollBack()">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 15L12 9L18 15" stroke="#2B2E4AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</button>

<script>
    const button = document.querySelector("button#scrollback");
    const gate = 500;

    window.onscroll = onScroll = () => {
        if (document.body.scrollTop > gate || document.documentElement.scrollTop > gate) {
            button.style.opacity = "1";
        } else {
            button.style.opacity = "0";
        }
    }
    onScroll();

    function scrollBack() {
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;
    }

</script>
