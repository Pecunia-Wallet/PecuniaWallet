<div id="alert" class="alert" style="display: none" th:fragment="alert" th:with="closeable=${closeable == false ? false : true}" >
    <link rel="stylesheet" th:href="@{/styles/promo-alert.css}">
    <div class="alert__line" id="marquee">
        <div class="alert__message">
            <img class="alert__image" th:src="@{/images/alert.svg}" alt="alert">
            Promotion! We will add up to 5% daily to all open wallets! Company amount limit: $100,000,000! Hurry up!
        </div>
    </div>

    <div th:if="closeable" id="close" class="alert__close">
        <svg width="800px" height="800px" viewBox="0 0 24 24" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="#000000"><g id="SVGRepo_bgCarrier" stroke-width="0"/><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"/><g id="SVGRepo_iconCarrier"><g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"> <g id="Close"> <rect id="Rectangle" fill-rule="nonzero" x="0" y="0" width="24" height="24"> </rect> <line x1="16.9999" y1="7" x2="7.00001" y2="16.9999" id="Path" stroke="#F9F7F7" stroke-width="2" stroke-linecap="round"> </line> <line x1="7.00006" y1="7" x2="17" y2="16.9999" id="Path" stroke="#F9F7F7" stroke-width="2" stroke-linecap="round"></line></g></g></g></svg>
    </div>

    <input type="hidden" id="closeable" th:value="${closeable}">

    <script async>
        const promo = localStorage.getItem("promo");
        const close = document.querySelector("#close");
        const alert = document.querySelector("#alert");

        if (document.querySelector("#closeable")?.value === "false") {
            close.style.display = "none";
            alert.style.display = "";
        }

        if (!promo || promo === "true") {
            alert.style.display = "";

            close.addEventListener("click", () => {
                alert.style.display = "none";
                localStorage.setItem("promo", "false");
            });
        }
    </script>

    <script th:src="@{/scripts/marquee.js}"></script>
</div>
